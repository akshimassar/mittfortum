repos:
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -v
        language: system
        pass_filenames: false
        require_serial: true
        files: ^(custom_components/fortum/.*\.py|tests/.*\.py|pyproject\.toml|\.pre-commit-config\.yaml)$
      - id: mypy
        name: mypy
        entry: uv run mypy custom_components tests
        language: system
        pass_filenames: false
        require_serial: true
        files: ^(custom_components/fortum/.*\.py|tests/.*\.py|pyproject\.toml|\.pre-commit-config\.yaml)$
      - id: frontend-tests
        name: frontend tests
        entry: bash -lc 'node --test tests/frontend/*.cjs'
        language: system
        pass_filenames: false
        require_serial: true
        files: ^(custom_components/fortum/frontend/.*\.(js|mjs|cjs)$|tests/frontend/.*\.(js|mjs|cjs)$|\.pre-commit-config\.yaml)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [.]
        pass_filenames: false
      - id: ruff-format
        args: [--check, .]
        pass_filenames: false
